; PlatformIO project configuration - WT32-ETH01 / ESP32 LAN8720 variants.

[platformio]
default_envs = wt32eth_release_final_safe

[env]
platform  = espressif32
board     = wt32-eth01
framework = arduino

build_flags =
    -D NDEBUG

monitor_speed   = 115200
upload_speed    = 115200
upload_protocol = esptool

; Main public build: Ethernet LAN for the scope, WiFi STA, permanent AP,
; LAN NTP, BODE, FY6900 and scope HTTP/noVNC proxies.
[env:wt32eth_release_final_safe]
extends = env
build_flags =
    ${env.build_flags}
    -D FW_RELEASE_FINAL_SAFE

; Recovery build: ignores stored config, forces AP, keeps FY hardware disabled.
[env:wt32eth_bringup_safe]
extends = env
build_flags =
    ${env.build_flags}
    -D FW_BRINGUP_SAFE

[env:wt32eth_final_test_safe]
extends = env
build_flags =
    ${env.build_flags}
    -D FW_FINAL_TEST_SAFE

; Service build: safe AP-only boot with manual FY diagnostic and functional test.
